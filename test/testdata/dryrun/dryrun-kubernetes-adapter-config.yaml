# Adapter deployment configuration for dry-run testing
adapter:
  name: dryrun-adapter
  version: "0.1.0"

clients:
  hyperfleet_api:
    timeout: 10s
    retry_attempts: 3
    retry_backoff: exponential

  broker:
    subscription_id: "dryrun-sub"
    topic: "cluster-events"

  kubernetes:
    api_version: "v1"
